name: Deploy Docker Compose to OCI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests Entrypoint
        run: bash django.sh
        env:
          TEST_DEPLOY: true
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DB: postgres
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          SECRET_KEY: 'django-insecure-j=a+qp*7+d33m8hasaj(^nl87+y74p9ym*1civ%b-l2(h-*&bb'
          COMPOSE_HTTP_TIMEOUT: 460
          DEBUG: False
          MOCK_DATA: true
        
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Copy Files via SCP to Oracle Linux
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: SSH and Restart Docker Compose Stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            
            if [ ! -d "DjangoTechnicalSupport" ]; then
              git clone git@github.com:cpluiz/DjangoTechnicalSupport.git
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            # Builda a aplicação com os novos arquivos baixados e reinicia os containers
            docker compose up -d --build --remove-orphans