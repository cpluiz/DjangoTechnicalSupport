name: CI/CD Pipeline to Back4App

on:
  push:
    branches:
      - main
jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image locally to verify there are no compilation/syntax errors
      - name: Verify Docker Build
        run: |
          docker build -t back4app-app:test .

      # Step 3: Run your application tests (Optional)
      # - name: Run Tests
      #   run: docker run back4app-app:test npm run test
  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      # Informational step tracking the Back4App native hook
      - name: Deploy to Back4App Host
        run: |
          echo "Code validated. Merging code changes triggers Back4App's automated Docker build pipeline."
