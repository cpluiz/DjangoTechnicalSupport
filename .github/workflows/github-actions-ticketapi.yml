name: CI/CD Pipeline to Back4App

env:
  DEVELOPMENT_APP_ID: "ae18fa3e-f8ed-4f81-963f-562fe38da9b2"
  PRODUCTION_APP_ID: "95039bc9-c2b3-49a7-a216-d6b42cef7121"
  APP_NAME: "Ticket API"
on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    name: 🚀 Deploy to Back4App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Docker Build
        run: |
          docker build -t back4app-app:test .
      
  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      # Informational step tracking the Back4App native hook
      - name: Deploy to Back4App Host
        run: |
          echo "Code validated. Merging code changes triggers Back4App's automated Docker build pipeline."

      - name: Validate configuration
        env:
          DEV_APP_ID: ${{ env.DEVELOPMENT_APP_ID }}
          PROD_APP_ID: ${{ env.PRODUCTION_APP_ID }}
          B4A_EMAIL: ${{ secrets.BACK4APP_EMAIL }}
          B4A_KEY: ${{ secrets.BACK4APP_ACCOUNT_KEY }}
        run: |
          echo "🔍 Checking configuration..."
          echo ""
          
          ERRORS=0
          
          # Check if App IDs have been configured
          if [ "$DEV_APP_ID" == "YOUR_DEVELOPMENT_APP_ID_HERE" ]; then
            echo "❌ DEVELOPMENT_APP_ID has not been configured!"
            echo "   → Edit line 38 in simpleDeploy.yaml with your Development App ID"
            echo ""
            ERRORS=$((ERRORS + 1))
          fi

          # Check if App IDs have been configured
          if [ "$DEV_APP_ID" == "YOUR_DEVELOPMENT_APP_ID_HERE" ]; then
            echo "❌ DEVELOPMENT_APP_ID has not been configured!"
            echo "   → Edit line 38 in simpleDeploy.yaml with your Development App ID"
            echo ""
            ERRORS=$((ERRORS + 1))
          fi
          
          # Check if secrets are set
          if [ -z "$B4A_EMAIL" ]; then
            echo "❌ BACK4APP_EMAIL secret is not set!"
            echo "   → Go to: Repository Settings → Secrets and variables → Actions → Secrets"
            echo "   → Click 'New repository secret'"
            echo "   → Name: BACK4APP_EMAIL"
            echo "   → Value: Your Back4App account email"
            echo ""
            ERRORS=$((ERRORS + 1))
          fi
          
          if [ -z "$B4A_KEY" ]; then
            echo "❌ BACK4APP_ACCOUNT_KEY secret is not set!"
            echo "   → Go to: Repository Settings → Secrets and variables → Actions → Secrets"
            echo "   → Click 'New repository secret'"
            echo "   → Name: BACK4APP_ACCOUNT_KEY"
            echo "   → Value: Your Back4App account key"
            echo ""
            ERRORS=$((ERRORS + 1))
          fi
          
          if [ $ERRORS -gt 0 ]; then
            echo "=================================================="
            echo "❌ Please fix the $ERRORS error(s) above and try again."
            echo "=================================================="
            exit 1
          fi
          
          echo "✅ All configuration looks good!"

      - name: Check branch setup
        run: |
          echo "🔍 Checking branch setup..."
          echo ""
          
          # Check for development branch
          if git ls-remote --heads origin development | grep -q development; then
            echo "✅ 'development' branch exists"
          else
            echo "⚠️  'development' branch does not exist!"
            echo ""
            echo "   To create it, run these commands in your terminal:"
            echo "   ─────────────────────────────────────────────────"
            echo "   git checkout -b development"
            echo "   git push -u origin development"
            echo ""
          fi
          
          # Check for main branch
          if git ls-remote --heads origin main | grep -q main; then
            echo "✅ 'main' branch exists"
          else
            echo "⚠️  'main' branch does not exist!"
            echo ""
            echo "   To create it, run these commands in your terminal:"
            echo "   ─────────────────────────────────────────────────"
            echo "   git checkout -b main"
            echo "   git push -u origin main"
            echo ""
          fi
          
          echo ""
          echo "📌 Current branch: ${{ github.ref_name }}"

      - name: Determine deployment target
        id: target
        run: |
          BRANCH="${{ github.ref_name }}"
          
          if [ "$BRANCH" == "development" ]; then
            echo "app_name=Development" >> $GITHUB_OUTPUT
            echo "app_id=${{ env.DEVELOPMENT_APP_ID }}" >> $GITHUB_OUTPUT
            echo ""
            echo "🎯 Target: Development App"
          elif [ "$BRANCH" == "main" ]; then
            echo "app_name=Production" >> $GITHUB_OUTPUT
            echo "app_id=${{ env.PRODUCTION_APP_ID }}" >> $GITHUB_OUTPUT
            echo ""
            echo "🎯 Target: Production App"
          else
            echo "❌ Unknown branch: $BRANCH"
            echo "   This workflow only supports 'development' and 'main' branches."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "📦 Found package.json - installing dependencies..."
            npm install
          else
            echo "⏭️  No package.json found - skipping npm install"
          fi
      
      - name: Install Back4App CLI
        run: |
          echo "📥 Installing Back4App CLI..."
          curl -s https://raw.githubusercontent.com/back4app/parse-cli/back4app/installer.sh | sudo /bin/bash
          echo "✅ Back4App CLI installed"
      
      - name: Configure Back4App account
        env:
          B4A_EMAIL: ${{ secrets.BACK4APP_EMAIL }}
          B4A_KEY: ${{ secrets.BACK4APP_ACCOUNT_KEY }}
        run: |
          echo "🔐 Configuring Back4App account..."
          mkdir -p ~/.back4app
          {
            echo "machine parsecli.back4app.com#${B4A_EMAIL}"
            echo "	login default"
            echo "	password ${B4A_KEY}"
            echo "machine parsecli.back4app.com"
            echo "	login default"
            echo "	password ${B4A_KEY}"
          } > ~/.back4app/netrc
          chmod 600 ~/.back4app/netrc
          echo "✅ Account configured"
      
      - name: Create Back4App config
        env:
          DEV_APP_ID: ${{ env.DEVELOPMENT_APP_ID }}
          PROD_APP_ID: ${{ env.PRODUCTION_APP_ID }}
        run: |
          echo "📝 Creating .parse.local config..."
          cat > .parse.local << EOF
          {
            "applications": {
              "Development": {
                "applicationId": "${DEV_APP_ID}"
              },
              "Production": {
                "applicationId": "${PROD_APP_ID}"
              }
            }
          }
          EOF
          echo "✅ Config file created"

      - name: Deploy to Back4App
        working-directory: ./
        env:
          APP_NAME: ${{ steps.target.outputs.app_name }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          DESCRIPTION="Deploy from GitHub Actions - ${APP_NAME} - Branch: ${{ github.ref_name }} - ${TIMESTAMP}"
          
          echo "=================================================="
          echo "🚀 DEPLOYING TO BACK4APP"
          echo "=================================================="
          echo ""
          echo "📌 Branch:      ${{ github.ref_name }}"
          echo "🎯 Target App:  ${APP_NAME}"
          echo "🕐 Time:        ${TIMESTAMP}"
          echo ""
          echo "=================================================="
          
          b4a deploy "${APP_NAME}" --description "${DESCRIPTION}"
          
          echo ""
          echo "=================================================="
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "=================================================="
      
      - name: Verify Cloud Code is running
        env:
          APP_ID: ${{ steps.target.outputs.app_id }}
        run: |
          echo "🏥 Verifying Cloud Code health..."
          
          # Wait for deployment to propagate
          sleep 5
          
          # Call a non-existent function - if Cloud Code is loaded, we get "Invalid function" error
          RESPONSE=$(curl -s -X POST \
            -H "X-Parse-Application-Id: $APP_ID" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://parseapi.back4app.com/functions/__health_check_test__")
          
          # Check if we get the expected "Invalid function" error (proves Cloud Code is running)
          if echo "$RESPONSE" | grep -q "Invalid function"; then
            echo ""
            echo "=================================================="
            echo "✅ HEALTH CHECK PASSED!"
            echo "   Cloud Code is running correctly."
            echo "=================================================="
          else
            echo ""
            echo "=================================================="
            echo "⚠️  Health check returned unexpected response:"
            echo "   $RESPONSE"
            echo ""
            echo "   This may be normal if your app has custom error handling."
            echo "=================================================="
          fi

      
