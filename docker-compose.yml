version: '3.9'

services:
  ticketapi:
    container_name: ticketapi
    build: .
    ports:
      - "8000:8000"
    environment:
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_DB=postgres
      - PG_HOST=db
      - PG_PORT=5432
      - SECRET_KEY='django-insecure-j=a+qp*7+d33m8hasaj(^nl87+y74p9ym*1civ%b-l2(h-*&bb'
      - COMPOSE_HTTP_TIMEOUT=460
      - DEBUG=False
      - MOCK_DATA=true
    depends_on:
      - db
  db:
    container_name: db
    image: postgres:14
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/posgresql/data

volumes:
  pgdata: {}
